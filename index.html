<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>薛某的个人博客</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 配置 Tailwind 使用 class 模式启用暗黑模式 -->
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <!-- 引入 FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- 引入样式文件 -->
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-gray-50 text-gray-800 dark:bg-gray-900 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-300">

    <!-- 顶部导航栏 -->
    <nav class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50 transition-colors duration-300">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center cursor-pointer" onclick="showHome()">
                    <i class="fa-solid fa-code text-blue-600 text-2xl mr-2"></i>
                    <!-- 👇 这里已经修改为您的博客名 -->
                    <span class="font-bold text-xl tracking-tight text-gray-900 dark:text-white">薛某的个人博客</span>
                </div>
                <div class="flex items-center space-x-4">
                    <!-- 夜间模式切换按钮 -->
                    <button id="theme-toggle" class="p-2 rounded-full text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white transition">
                        <i id="theme-icon" class="fas fa-moon"></i>
                    </button>
                    
                    <a href="https://github.com/xlx19" target="_blank" class="text-gray-500 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white transition"><i class="fa-brands fa-github text-xl"></i></a>
                    <button onclick="alert('博主很懒，还没写关于页面！')" class="text-gray-500 hover:text-blue-600 dark:text-gray-400 dark:hover:text-blue-400 transition font-medium">关于我</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- 主要内容区域 -->
    <main class="flex-grow max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <!-- 首页视图 -->
        <div id="home-view" class="fade-in">
            <!-- 个人简介卡片 -->
            <div class="bg-gradient-to-r from-blue-500 to-indigo-600 rounded-2xl p-8 mb-10 text-white shadow-lg">
                <h1 class="text-3xl font-bold mb-4">欢迎来到我的数字花园 🌱</h1>
                <p class="text-blue-100 text-lg max-w-2xl">
                    这是一个又菜又爱折腾的大一菜鸟新生 || 网络工程兼半个物联网工程专业学生
                    <br>目前正在学习：Cloudflare 部署、STM32及Arduino单片机。
                </p>
            </div>

            <!-- 分类标签 -->
            <div class="flex space-x-2 mb-8 overflow-x-auto pb-2 scrollbar-hide">
                <button onclick="filterPosts('全部', this)" class="filter-btn active px-4 py-1.5 rounded-full text-sm font-medium cursor-pointer whitespace-nowrap transition border border-transparent bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-200">全部</button>
                <button onclick="filterPosts('技术笔记', this)" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium cursor-pointer whitespace-nowrap transition border border-gray-200 bg-white text-gray-600 hover:bg-gray-50 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-300 dark:hover:bg-gray-700">技术笔记</button>
                <button onclick="filterPosts('生活随笔', this)" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium cursor-pointer whitespace-nowrap transition border border-gray-200 bg-white text-gray-600 hover:bg-gray-50 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-300 dark:hover:bg-gray-700">生活随笔</button>
                <button onclick="filterPosts('HTML实验室', this)" class="filter-btn px-4 py-1.5 rounded-full text-sm font-medium cursor-pointer whitespace-nowrap transition border border-gray-200 bg-white text-gray-600 hover:bg-gray-50 dark:bg-gray-800 dark:border-gray-700 dark:text-gray-300 dark:hover:bg-gray-700"><i class="fa-solid fa-flask mr-1"></i>HTML 实验室</button>
            </div>

            <!-- 文章列表容器 -->
            <div id="posts-container" class="grid gap-8 md:grid-cols-2 lg:grid-cols-3"></div>

            <!-- 空状态提示 -->
            <div id="empty-state" class="hidden text-center py-20">
                <div class="text-gray-300 dark:text-gray-600 text-6xl mb-4"><i class="fa-regular fa-folder-open"></i></div>
                <p class="text-gray-500 dark:text-gray-400 text-lg">这个分类下暂时没有内容哦</p>
            </div>
        </div>

        <!-- 文章详情页 -->
        <div id="article-view" class="hidden fade-in">
            <button onclick="showHome()" class="mb-6 flex items-center text-blue-600 hover:text-blue-800 dark:text-blue-400 dark:hover:text-blue-300 transition font-medium">
                <i class="fa-solid fa-arrow-left mr-2"></i> 返回首页
            </button>
            <article class="bg-white dark:bg-gray-800 rounded-2xl shadow-sm p-8 md:p-12 border border-gray-100 dark:border-gray-700 transition-colors duration-300">
                <div class="mb-8 border-b border-gray-100 dark:border-gray-700 pb-8">
                    <div class="flex items-center text-sm text-gray-500 dark:text-gray-400 mb-3 space-x-4">
                        <span id="article-date"></span>
                        <span id="article-category" class="px-2 py-0.5 bg-gray-100 dark:bg-gray-700 rounded text-xs text-gray-600 dark:text-gray-300"></span>
                    </div>
                    <h1 id="article-title" class="text-3xl md:text-4xl font-extrabold text-gray-900 dark:text-white leading-tight"></h1>
                </div>
                <!-- 文章内容容器 -->
                <div id="article-content" class="markdown-body text-lg"></div>
            </article>
        </div>

    </main>

    <footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 mt-12 py-8 text-center text-gray-500 dark:text-gray-400 text-sm transition-colors duration-300">
        <p>&copy; 2024 xlx19. All rights reserved. | Powered by Cloudflare Pages</p>
    </footer>

    <!-- 脚本引入：顺序很重要，先引入数据，再引入逻辑 -->
    <script src="data.js"></script>
    <script src="script.js"></script>

</body>
</html>
