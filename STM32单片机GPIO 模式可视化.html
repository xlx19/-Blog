<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单片机 GPIO 模式可视化</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f4f8; }
        .switch-arm { transition: transform 0.3s cubic-bezier(0.4, 2.08, 0.55, 0.44); transform-origin: 20px 5px; }
        .wire { transition: stroke 0.3s; }
        .electron-flow {
            stroke-dasharray: 10;
            animation: dash 1s linear infinite;
        }
        @keyframes dash {
            to { stroke-dashoffset: -20; }
        }
        .glow-red { filter: drop-shadow(0 0 5px rgba(239, 68, 68, 0.7)); }
        .glow-blue { filter: drop-shadow(0 0 5px rgba(59, 130, 246, 0.7)); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [mode, setMode] = useState('push-pull'); // push-pull, open-drain, floating
            const [logicLevel, setLogicLevel] = useState(1); // 1 or 0
            const [externalPullUp, setExternalPullUp] = useState(false);

            // 内部开关状态逻辑
            // Push-Pull: 1 -> Top ON/Bot OFF; 0 -> Top OFF/Bot ON
            // Open-Drain: 1 -> Top OFF/Bot OFF (Float); 0 -> Top OFF/Bot ON
            // Floating: Always OFF
            
            const isTopSwitchClosed = mode === 'push-pull' && logicLevel === 1;
            const isBottomSwitchClosed = (mode === 'push-pull' || mode === 'open-drain') && logicLevel === 0;

            // 计算最终输出电压状态
            let outputState = 'floating'; // floating, high, low
            if (isTopSwitchClosed) outputState = 'high';
            else if (isBottomSwitchClosed) outputState = 'low';
            else if (externalPullUp) outputState = 'high'; // 被外部电阻拉高
            else outputState = 'floating';

            const getColor = (state) => {
                if (state === 'high') return '#ef4444'; // Red
                if (state === 'low') return '#3b82f6';  // Blue
                return '#9ca3af'; // Grey
            };

            const wireColor = getColor(outputState);

            return (
                <div className="min-h-screen flex flex-col items-center p-4">
                    <h1 className="text-3xl font-bold text-gray-800 mb-2">单片机 GPIO 模式可视化</h1>
                    <p className="text-gray-600 mb-6 text-center max-w-xl">
                        通过下方的控制面板，观察不同模式下MCU内部MOS管（开关）的动作以及对输出引脚的影响。
                    </p>

                    {/* Controls */}
                    <div className="bg-white p-6 rounded-xl shadow-lg w-full max-w-4xl mb-6 grid grid-cols-1 md:grid-cols-3 gap-6">
                        {/* Mode Selection */}
                        <div className="flex flex-col gap-2">
                            <label className="font-semibold text-gray-700">1. 选择 GPIO 模式</label>
                            <div className="flex flex-col gap-2">
                                <button 
                                    onClick={() => setMode('push-pull')}
                                    className={`px-4 py-2 rounded-lg border-2 text-left transition-all ${mode === 'push-pull' ? 'border-blue-500 bg-blue-50 text-blue-700 font-bold' : 'border-gray-200 hover:bg-gray-50'}`}
                                >
                                    推挽输出 (Push-Pull)
                                </button>
                                <button 
                                    onClick={() => { setMode('open-drain'); setLogicLevel(1); }}
                                    className={`px-4 py-2 rounded-lg border-2 text-left transition-all ${mode === 'open-drain' ? 'border-purple-500 bg-purple-50 text-purple-700 font-bold' : 'border-gray-200 hover:bg-gray-50'}`}
                                >
                                    开漏输出 (Open-Drain)
                                </button>
                                <button 
                                    onClick={() => setMode('floating')}
                                    className={`px-4 py-2 rounded-lg border-2 text-left transition-all ${mode === 'floating' ? 'border-gray-500 bg-gray-50 text-gray-700 font-bold' : 'border-gray-200 hover:bg-gray-50'}`}
                                >
                                    高阻态/悬空 (Floating)
                                </button>
                            </div>
                        </div>

                        {/* Logic Control */}
                        <div className="flex flex-col gap-2">
                            <label className="font-semibold text-gray-700">2. 内部逻辑控制</label>
                            <div className="flex gap-2 bg-gray-100 p-1 rounded-lg">
                                <button 
                                    onClick={() => setLogicLevel(0)}
                                    disabled={mode === 'floating'}
                                    className={`flex-1 py-2 rounded shadow-sm transition-all ${logicLevel === 0 && mode !== 'floating' ? 'bg-blue-500 text-white' : 'bg-white text-gray-500 hover:text-gray-700 disabled:opacity-50'}`}
                                >
                                    输出 0 (Low)
                                </button>
                                <button 
                                    onClick={() => setLogicLevel(1)}
                                    disabled={mode === 'floating'}
                                    className={`flex-1 py-2 rounded shadow-sm transition-all ${logicLevel === 1 && mode !== 'floating' ? 'bg-red-500 text-white' : 'bg-white text-gray-500 hover:text-gray-700 disabled:opacity-50'}`}
                                >
                                    输出 1 (High)
                                </button>
                            </div>
                            <div className="text-sm text-gray-500 mt-2">
                                {mode === 'floating' ? '悬空模式下输出逻辑无效' : 
                                 mode === 'open-drain' && logicLevel === 1 ? '注意：开漏输出1时，实际上是断开内部连接' : 
                                 '控制内部开关的通断'}
                            </div>
                        </div>

                        {/* External Circuit */}
                        <div className="flex flex-col gap-2">
                            <label className="font-semibold text-gray-700">3. 外部电路设置</label>
                            <button 
                                onClick={() => setExternalPullUp(!externalPullUp)}
                                className={`flex items-center justify-between px-4 py-3 rounded-lg border-2 transition-all ${externalPullUp ? 'border-green-500 bg-green-50 text-green-700' : 'border-gray-300 text-gray-400'}`}
                            >
                                <span>外部上拉电阻 (Pull-Up)</span>
                                <div className={`w-10 h-6 rounded-full p-1 transition-colors ${externalPullUp ? 'bg-green-500' : 'bg-gray-300'}`}>
                                    <div className={`w-4 h-4 rounded-full bg-white transform transition-transform ${externalPullUp ? 'translate-x-4' : ''}`}></div>
                                </div>
                            </button>
                            <div className="text-xs text-gray-500 mt-1">
                                {mode === 'open-drain' ? '开漏模式必须接上拉电阻才能输出高电平！' : '推挽模式通常不需要外部上拉。'}
                            </div>
                        </div>
                    </div>

                    {/* Visualization Area */}
                    <div className="relative bg-white p-8 rounded-xl shadow-lg w-full max-w-4xl flex flex-col items-center">
                        <div className="absolute top-4 left-4 bg-gray-100 px-3 py-1 rounded text-xs font-mono text-gray-500">MCU INTERNAL</div>
                        <div className="absolute top-4 right-4 bg-gray-100 px-3 py-1 rounded text-xs font-mono text-gray-500">EXTERNAL WORLD</div>
                        
                        <svg width="600" height="350" viewBox="0 0 600 350" className="max-w-full">
                            {/* Definitions */}
                            <defs>
                                <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                                    <polygon points="0 0, 10 3.5, 0 7" fill="#666" />
                                </marker>
                            </defs>

                            {/* MCU Box Boundary */}
                            <rect x="50" y="20" width="250" height="310" rx="10" fill="none" stroke="#ddd" strokeWidth="2" strokeDasharray="5,5" />

                            {/* VCC Rail (Internal) */}
                            <text x="70" y="45" fill="#ef4444" fontWeight="bold">VCC (3.3V/5V)</text>
                            <line x1="100" y1="50" x2="200" y2="50" stroke="#ef4444" strokeWidth="4" />
                            <line x1="150" y1="50" x2="150" y2="80" stroke="#ef4444" strokeWidth="4" />

                            {/* Top Switch (PMOS) */}
                            <g transform="translate(150, 80)">
                                {/* Switch Terminals */}
                                <circle cx="0" cy="0" r="4" fill="#333" />
                                <circle cx="0" cy="50" r="4" fill="#333" />
                                {/* Switch Arm */}
                                <line 
                                    x1="0" y1="0" x2="0" y2="50" 
                                    stroke="#333" strokeWidth="4" 
                                    className="switch-arm"
                                    style={{ 
                                        transform: isTopSwitchClosed ? 'rotate(0deg)' : 'rotate(-30deg)',
                                        opacity: mode === 'push-pull' ? 1 : 0.2 // Ghost the top switch if not in push-pull
                                    }}
                                />
                                <text x="-80" y="25" fontSize="12" fill="#666">P-MOS (上管)</text>
                            </g>

                            {/* Middle Connection Point */}
                            <line x1="150" y1="130" x2="150" y2="175" stroke={wireColor} strokeWidth="4" className="wire" />
                            <circle cx="150" cy="175" r="5" fill={wireColor} className="wire" />

                            {/* Bottom Switch (NMOS) */}
                            <g transform="translate(150, 175)">
                                <line x1="0" y1="0" x2="0" y2="50" stroke={wireColor} strokeWidth="4" className="wire" /> 
                                {/* Switch Terminals */}
                                <circle cx="0" cy="50" r="4" fill="#333" />
                                <circle cx="0" cy="100" r="4" fill="#333" />
                                {/* Switch Arm */}
                                <line 
                                    x1="0" y1="50" x2="0" y2="100" 
                                    stroke="#333" strokeWidth="4" 
                                    className="switch-arm"
                                    style={{ 
                                        transform: isBottomSwitchClosed ? 'rotate(0deg)' : 'rotate(-30deg)',
                                        opacity: mode === 'floating' ? 0.2 : 1
                                    }}
                                />
                                <text x="-80" y="80" fontSize="12" fill="#666">N-MOS (下管)</text>
                            </g>

                            {/* GND Rail (Internal) */}
                            <line x1="150" y1="275" x2="150" y2="300" stroke="#3b82f6" strokeWidth="4" />
                            <line x1="100" y1="300" x2="200" y2="300" stroke="#3b82f6" strokeWidth="4" />
                            <text x="70" y="315" fill="#3b82f6" fontWeight="bold">GND (0V)</text>

                            {/* Output Pin */}
                            <line x1="150" y1="175" x2="350" y2="175" stroke={wireColor} strokeWidth="6" className="wire" />
                            <circle cx="300" cy="175" r="8" fill="#333" />
                            <text x="285" y="200" fontSize="12" fontWeight="bold">GPIO PIN</text>

                            {/* External Pull-up Resistor */}
                            {externalPullUp && (
                                <g>
                                    <line x1="350" y1="175" x2="350" y2="100" stroke={outputState === 'low' ? '#3b82f6' : '#ef4444'} strokeWidth="3" />
                                    <line x1="350" y1="100" x2="450" y2="100" stroke="#ef4444" strokeWidth="3" />
                                    {/* Resistor symbol */}
                                    <rect x="340" y="110" width="20" height="40" fill="#fff" stroke="#333" strokeWidth="2" transform="translate(0, -20)" />
                                    <text x="370" y="130" fontSize="12" fill="#444">上拉电阻</text>
                                    <text x="460" y="105" fill="#ef4444" fontSize="12">VCC</text>
                                </g>
                            )}

                            {/* Load / Voltmeter */}
                            <g transform="translate(450, 150)">
                                <rect x="0" y="0" width="80" height="50" rx="5" fill="#333" />
                                <text x="40" y="30" textAnchor="middle" fill={outputState === 'high' ? '#ef4444' : outputState === 'low' ? '#3b82f6' : '#999'} fontSize="20" fontWeight="bold" fontFamily="monospace">
                                    {outputState === 'high' ? 'High' : outputState === 'low' ? 'Low' : 'Float'}
                                </text>
                                <line x1="-100" y1="25" x2="0" y2="25" stroke={wireColor} strokeWidth="2" strokeDasharray="4" />
                            </g>
                            
                            {/* Current Flow Animation (Only show when circuit is complete) */}
                            {outputState === 'high' && (
                                <line x1="150" y1="50" x2="350" y2="175" fill="none" stroke="rgba(255,255,255,0.6)" strokeWidth="3" className="electron-flow" />
                            )}
                            {outputState === 'low' && (
                                <path d={externalPullUp ? "M 450 100 L 350 100 L 350 175 L 150 175 L 150 300" : "M 350 175 L 150 175 L 150 300"} fill="none" stroke="rgba(255,255,255,0.6)" strokeWidth="3" className="electron-flow" />
                            )}

                        </svg>
                        
                        {/* Explanation Box */}
                        <div className="mt-6 p-4 bg-yellow-50 border border-yellow-200 rounded-lg text-sm text-gray-700 w-full">
                            <h3 className="font-bold text-yellow-800 mb-2 flex items-center">
                                <span className="mr-2 text-xl">💡</span> 
                                {mode === 'push-pull' && '推挽模式 (Push-Pull)'}
                                {mode === 'open-drain' && '开漏模式 (Open-Drain)'}
                                {mode === 'floating' && '高阻态 (Floating)'}
                                详解
                            </h3>
                            <p className="leading-relaxed">
                                {mode === 'push-pull' && (
                                    <span>
                                        <strong>原理：</strong>内部既有上管(PMOS)也有下管(NMOS)。<br/>
                                        <strong>输出1时：</strong>上管导通，直接连接VCC，输出强高电平。<br/>
                                        <strong>输出0时：</strong>下管导通，直接连接GND，输出强低电平。<br/>
                                        <strong>特点：</strong>驱动能力强，开关速度快。像一扇双向门，既能推也能拉。
                                    </span>
                                )}
                                {mode === 'open-drain' && (
                                    <span>
                                        <strong>原理：</strong>内部只有下管(NMOS)工作，上管断开或不存在。<br/>
                                        <strong>输出0时：</strong>下管导通，连接GND，强力拉低。<br/>
                                        <strong>输出1时：</strong>下管截止，引脚处于<strong>悬空</strong>状态！(请看上图灰色线)。<br/>
                                        <strong>关键：</strong>如果你想输出高电平，<strong>必须</strong>打开“外部上拉电阻”，由外部电源将电平拉高。这就像水槽的塞子，拔掉塞子水流走(0)，堵上塞子本身没水，需要水龙头(上拉)注水。常用于I2C总线。
                                    </span>
                                )}
                                {mode === 'floating' && (
                                    <span>
                                        <strong>原理：</strong>上管和下管都处于关闭状态。<br/>
                                        <strong>现象：</strong>引脚呈现高阻抗，相当于与内部电路断开。<br/>
                                        <strong>用途：</strong>通常用于作为<strong>输入引脚</strong>（Input Mode），读取外部电压信号。此时如果不接外部信号，电压是不确定的，容易受到静电干扰。
                                    </span>
                                )}
                            </p>
                        </div>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
