<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STM32 学习笔记 | 薛某的Blog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans SC"', 'sans-serif'],
                        mono: ['"JetBrains Mono"', 'monospace'],
                    },
                    colors: {
                        primary: { 500: '#3b82f6', 600: '#2563eb' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-200 min-h-screen flex flex-col">

    <!-- 导航栏 -->
    <header class="sticky top-0 z-50 w-full backdrop-blur-lg bg-white/80 dark:bg-slate-900/80 border-b border-slate-200 dark:border-slate-800">
        <div class="max-w-6xl mx-auto px-4 h-16 flex justify-between items-center">
            <a href="/" class="flex items-center gap-2 group">
                <div class="bg-primary-600 text-white p-1.5 rounded-lg group-hover:bg-primary-500 transition-colors">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i>
                </div>
                <span class="font-mono font-bold text-xl">返回<span class="text-primary-600">首页</span></span>
            </a>
            <div class="font-bold text-lg">STM32 嵌入式实验室</div>
        </div>
    </header>

    <!-- 专栏头部 -->
    <div class="bg-slate-900 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <div class="inline-flex items-center justify-center p-4 bg-white/10 rounded-full mb-6">
                <i data-lucide="cpu" class="w-12 h-12 text-blue-400"></i>
            </div>
            <h1 class="text-4xl font-bold mb-4">STM32 开发笔记</h1>
            <p class="text-slate-400 max-w-2xl mx-auto">
                记录从 51 单片机转战 STM32 的全过程。包含 HAL 库使用、RTOS 移植、外设驱动编写以及各种踩坑实录。
                <br>No input, no output.
            </p>
        </div>
    </div>

    <!-- 笔记列表 -->
    <main class="flex-grow max-w-4xl w-full mx-auto px-4 py-12">
        <div class="grid gap-6">
            
            <!-- 章节：基础入门 -->
            <div class="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-primary-600">
                    <i data-lucide="book-open" class="w-5 h-5"></i> 基础入门 (标准库)
                </h2>
                <div class="space-y-3">
                    <a href="#" class="block p-3 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors flex justify-between items-center group">
                        <span class="font-medium group-hover:text-primary-600 transition-colors">01. 开发环境搭建 (Keil MDK)</span>
                        <span class="text-xs text-slate-400 font-mono">2023-10-01</span>
                    </a>
                    <a href="#" class="block p-3 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors flex justify-between items-center group">
                        <span class="font-medium group-hover:text-primary-600 transition-colors">02. GPIO 输出：点亮第一颗 LED</span>
                        <span class="text-xs text-slate-400 font-mono">2023-10-02</span>
                    </a>
                    <a href="#" class="block p-3 rounded-lg hover:bg-slate-50 dark:hover:bg-slate-700/50 transition-colors flex justify-between items-center group">
                        <span class="font-medium group-hover:text-primary-600 transition-colors">03. 串口通信：重定向 Printf</span>
                        <span class="text-xs text-slate-400 font-mono">2023-10-05</span>
                    </a>
                </div>
            </div>

            <!-- 章节：进阶应用 -->
            <div class="bg-white dark:bg-slate-800 rounded-xl p-6 border border-slate-200 dark:border-slate-700 shadow-sm">
                <h2 class="text-xl font-bold mb-4 flex items-center gap-2 text-purple-500">
                    <i data-lucide="layers" class="w-5 h-5"></i> 进阶应用 & RTOS
                </h2>
                <div class="text-center py-8 text-slate-500 text-sm">
                    <i data-lucide="hammer" class="w-8 h-8 mx-auto mb-2 opacity-50"></i>
                    内容更新中...
                </div>
            </div>

        </div>
    </main>

    <footer class="text-center py-8 text-slate-500 text-sm border-t border-slate-200 dark:border-slate-800">
        © 2023 薛某的Blog
    </footer>

    <script>
        lucide.createIcons();
        if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
    </script>
</body>
</html>
